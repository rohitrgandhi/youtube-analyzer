<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #1a1a1a;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .progress {
            margin-top: 20px;
            display: none;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        .message {
            text-align: center;
            color: #666;
            font-size: 14px;
        }
        .message.error {
            color: #dc143c;
        }
        .message.success {
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 YouTube Analyzer</h1>
        <p class="subtitle">Analyze any YouTube channel's performance</p>
        
        <input 
            type="text" 
            id="channel" 
            placeholder="Enter channel name (e.g., @mkbhd)" 
            autocomplete="off"
        />
        
        <button id="analyzeBtn" onclick="startAnalysis()">
            Analyze Channel
        </button>
        
        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="message" id="message">Starting...</div>
        </div>
    </div>

    <script>
        let taskId = null;
        
        function startAnalysis() {
            const channel = document.getElementById('channel').value.trim();
            
            if (!channel) {
                showMessage('Please enter a channel name', 'error');
                return;
            }
            
            const btn = document.getElementById('analyzeBtn');
            btn.disabled = true;
            btn.textContent = 'Analyzing...';
            
            document.getElementById('progress').style.display = 'block';
            
            fetch('/api/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({channel: channel})
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showMessage(data.error, 'error');
                    resetButton();
                } else {
                    taskId = data.task_id;
                    checkProgress();
                }
            })
            .catch(err => {
                showMessage('Error: ' + err.message, 'error');
                resetButton();
            });
        }
        
        function checkProgress() {
            fetch('/api/progress/' + taskId)
            .then(r => r.json())
            .then(data => {
                updateProgress(data.progress);
                showMessage(data.message);
                
                if (data.status === 'complete') {
                    showMessage('✅ Done! Opening report...', 'success');
                    window.open('/api/report/' + data.result.html_file.split('/').pop(), '_blank');
                    setTimeout(resetButton, 2000);
                } else if (data.status === 'error') {
                    showMessage('❌ ' + data.error, 'error');
                    resetButton();
                } else {
                    setTimeout(checkProgress, 1000);
                }
            })
            .catch(err => {
                showMessage('Error: ' + err.message, 'error');
                resetButton();
            });
        }
        
        function updateProgress(percent) {
            document.getElementById('progressFill').style.width = percent + '%';
        }
        
        function showMessage(text, type = '') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }
        
        function resetButton() {
            const btn = document.getElementById('analyzeBtn');
            btn.disabled = false;
            btn.textContent = 'Analyze Channel';
            document.getElementById('progress').style.display = 'none';
            updateProgress(0);
        }
        
        // Allow Enter key to submit
        document.getElementById('channel').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') startAnalysis();
        });
    </script>
</body>
</html>
